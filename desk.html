<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L-Shaped Desk</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body style="margin:0; font-family:Arial;">

  <!-- Back button -->
  <a href="index.html" 
     style="position:absolute; z-index:10; top:15px; left:15px; 
            background:#000; color:#fff; padding:10px 15px; 
            text-decoration:none; border-radius:6px;">
     ← Back
  </a>

  <!-- Title -->
  <div style="position:absolute; top:15px; width:100%; text-align:center; font-weight:bold; z-index:10;">
    L-Shaped Desk
  </div>

  <!-- Logo -->
  <img src="logo.png" 
       alt="Company Logo"
       style="position:absolute; top:15px; right:15px; width:120px; height:auto; z-index:10; pointer-events:none;">

  <!-- Rotate hint -->
  <div style="position:absolute; bottom:15px; left:50%; transform:translateX(-50%);
              background:rgba(0,0,0,0.5); color:white; padding:5px 10px; border-radius:5px; font-size:12px; z-index:10;">
    Drag to rotate
  </div>

  <!-- 3D Viewer -->
  <model-viewer 
    src="models/Desk.glb"
    camera-controls
    auto-rotate
    shadow-intensity="1.2"
    exposure="1.3"
    environment-image="neutral"
    background-color="#f0f0f0"
    style="width:100%; height:100vh;">
  </model-viewer>

</body>
</html>
